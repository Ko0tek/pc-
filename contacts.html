        <h1>Свяжитесь с нами</h1>
        <div class="contacts-wrapper">
            <div class="contact-info">
                <h3>Наши контакты</h3>
                <p>📞 Телефон: +7 (999) 123-67-67</p>
                <p>✉️ Email: info@pcbuilder.ru</p>

                <p>🕒 Режим работы: Пн-Пт с 10:00 до 20:00</p>
            </div>

            <div class="contact-form">
                <h3>Оставить заявку на сборку</h3>
                <form>
                    <input type="text" placeholder="Ваше имя" required>
                    <input type="email" placeholder="Ваш Email" required>
                    <input type="tel" placeholder="Телефон">
                    <textarea rows="3" placeholder="Бюджет, цель использования (игры, работа, монтаж)"></textarea>
                    <button type="button" class="alert-btn" onclick="alert('Спасибо! Наш специалист свяжется с вами в течение часа.')">Отправить заявку</button>
                </form>
            </div>
        </div>

        <button class="alert-btn" onclick="alert('Закажите обратный звонок по телефону +7 (999) 123-67-67')">Перезвонить мне</button>
