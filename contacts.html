<body>
    <div class="header">
        <img src="https://raw.githubusercontent.com/Ko0tek/pc-/refs/heads/main/E605C9AB-5544-4F15-A773-3E8A56665897.png" alt="PC Builder Logo" class="logo">
	<div class="menu">
        <a href="index.html" class="button">Главная</a>
        <a href="catalog.html" class="button">Комплектующие</a>

    <div class="container">
        <h1>Свяжитесь с нами</h1>
        <div class="contacts-wrapper">
            <div class="contact-info">
                <h3>Наши контакты</h3>
                <p>Телефон: +7 (999) 123-67-67</p>
                <p>Email: info@pcbuilder.ru</p>
                <p>Адрес: г. Москва, ул. Компьютерная, д. 8, офис 405</p>
                <p>Режим работы: Пн-Пт с 10:00 до 20:00</p>
            </div>

            <div class="contact-form">
                <h3>Оставить заявку на сборку</h3>
                <form>
                    <input type="text" placeholder="Ваше имя" required>
                    <input type="email" placeholder="Ваш Email" required>
                    <input type="tel" placeholder="Телефон">
                    <textarea rows="3" placeholder="Бюджет, цель использования (игры, работа, монтаж)"></textarea>
                    <button type="button" class="alert-btn" onclick="alert('Спасибо! Наш специалист свяжется с вами в течение часа.')">Отправить заявку</button>
                </form>
            </div>
        </div>

        <h2>Как добраться</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1883.473377396646!2d37.50583362870201!3d55.84809217488448!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x46b537efe3d882af%3A0x377ee0f35802c5ce!2z0JrQvtC70LvQtdC00LYg0JjQvdGE0L7RgNC80LDRgtC40LrQuCDQuCDQn9GA0L7Qs9GA0LDQvNC80LjRgNC-0LLQsNC90LjRjw!5e0!3m2!1sru!2slv!4v1781121792192!5m2!1sru!2slv" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>

        <button class="alert-btn" onclick="alert('Закажите обратный звонок по телефону +7 (999) 123-67-67')">Перезвонить мне</button>
    </div>
